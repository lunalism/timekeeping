const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
const $ = (id) => document.getElementById(id);
const pad = (n, w=2) => String(n).padStart(w, '0');

function todayKey(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function parseItemDate(item, kind) {
  const [y,m,d] = item.day.split('-').map(Number);
  const [hh,mm] = item[kind].split(':').map(Number);
  return new Date(y, m-1, d, hh, mm, 0, 0);
}

function computeSlots(now) {
  const key = todayKey(now);
  const items = SCHEDULE.filter(i => i.day === key);

  let current = null, prev = null, next = null;

  for (const it of items) {
    const s = parseItemDate(it, 'start');
    const e = parseItemDate(it, 'end');
    if (s <= now && now < e) {
      if (!current || s > parseItemDate(current, 'start')) current = it;
    }
    if (e <= now) {
      if (!prev || e > parseItemDate(prev, 'end')) prev = it;
    }
    if (s > now) {
      if (!next || s < parseItemDate(next, 'start')) next = it;
    }
  }
  return { current, prev, next };
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderSide(id, item) {
  const el = $(id);
  if (!item) {
    el.innerHTML = '<div class="side-empty">—</div>';
    return;
  }
  el.innerHTML = `
    <div class="side-time">${escapeHtml(item.start)} → ${escapeHtml(item.end)}</div>
    <div class="side-title">${escapeHtml(item.title)}</div>
    <div class="side-part">${escapeHtml(item.participants)}</div>
  `;
}

function renderNow(item) {
  const titleEl = $('now-title');
  const metaEl = $('now-meta');
  if (!item) {
    titleEl.textContent = 'NO ACTIVE SESSION';
    metaEl.textContent = '';
    return;
  }
  titleEl.textContent = item.title;
  metaEl.textContent = `${item.start} → ${item.end} · ${item.participants}`;
}

const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function renderClock() {
  const now = new Date();
  $('hm').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  $('sec').textContent = `:${pad(now.getSeconds())}`;
  $('ms').textContent = `.${pad(now.getMilliseconds(), 3)}`;
  requestAnimationFrame(renderClock);
}

function renderDateTZ() {
  const now = new Date();
  $('date').textContent = `${DAYS[now.getDay()]} · ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  $('tz').textContent = TZ;
}

function tick() {
  const now = new Date();
  const { current, prev, next } = computeSlots(now);
  renderSide('prev-body', prev);
  renderSide('next-body', next);
  renderNow(current);
  renderDateTZ();
}

tick();
setInterval(tick, 500);
requestAnimationFrame(renderClock);
</script>
