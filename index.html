const $ = (id) => document.getElementById(id);
const pad = (n, w=2) => String(n).padStart(w, '0');

function todayKey(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function parseItemDate(item, kind) {
  const [y,m,d] = item.day.split('-').map(Number);
  const [hh,mm] = item[kind].split(':').map(Number);
  return new Date(y, m-1, d, hh, mm, 0, 0);
}

function computeSlots(now) {
  const key = todayKey(now);
  const items = SCHEDULE.filter(i => i.day === key);

  const currents = [];
  let next = null;

  for (const it of items) {
    const s = parseItemDate(it, 'start');
    const e = parseItemDate(it, 'end');
    if (s <= now && now < e) {
      currents.push(it);
    }
    if (s > now) {
      if (!next || s < parseItemDate(next, 'start')) next = it;
    }
  }
  currents.sort((a, b) => parseItemDate(a, 'start') - parseItemDate(b, 'start'));
  return { currents, next };
}

function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text !== undefined) e.textContent = text;
  return e;
}

function buildNowItem(it) {
  const card = el('div', 'now-item');
  card.appendChild(el('div', 'now-item-label', 'NOW'));
  card.appendChild(el('div', 'now-item-title', it.title));
  card.appendChild(el('div', 'now-item-time', `${it.start} → ${it.end}`));
  card.appendChild(el('div', 'now-item-part', it.participants));
  return card;
}

function renderNow(items) {
  const single = $('now-single');
  const body = $('now-body');
  const topRow = $('now-row-top');
  const bottomRow = $('now-row-bottom');

  topRow.innerHTML = '';
  bottomRow.innerHTML = '';

  if (items.length <= 1) {
    single.classList.remove('hidden');
    topRow.classList.add('hidden');
    bottomRow.classList.add('hidden');
    body.innerHTML = '';
    if (items.length === 0) {
      body.appendChild(el('div', 'card-title', 'NO ACTIVE SESSION'));
    } else {
      const it = items[0];
      body.appendChild(el('div', 'card-title', it.title));
      body.appendChild(el('div', 'card-time', `${it.start} → ${it.end}`));
      body.appendChild(el('div', 'card-part', it.participants));
    }
    return;
  }

  single.classList.add('hidden');
  topRow.classList.remove('hidden');

  const topItems = items.slice(0, 2);
  const bottomItems = items.slice(2);

  for (const it of topItems) topRow.appendChild(buildNowItem(it));

  if (bottomItems.length > 0) {
    bottomRow.classList.remove('hidden');
    for (const it of bottomItems) bottomRow.appendChild(buildNowItem(it));
  } else {
    bottomRow.classList.add('hidden');
  }
}

function renderCard(prefix, item, emptyText) {
  const titleEl = $(`${prefix}-title`);
  const timeEl = $(`${prefix}-time`);
  const partEl = $(`${prefix}-part`);
  if (!item) {
    titleEl.textContent = emptyText;
    timeEl.classList.add('hidden');
    partEl.classList.add('hidden');
    timeEl.textContent = '';
    partEl.textContent = '';
    return;
  }
  titleEl.textContent = item.title;
  timeEl.textContent = `${item.start} → ${item.end}`;
  partEl.textContent = item.participants;
  timeEl.classList.remove('hidden');
  partEl.classList.remove('hidden');
}

const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function renderClock() {
  const now = new Date();
  $('hm').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  $('sec').textContent = `:${pad(now.getSeconds())}`;
  $('ms').textContent = `.${pad(now.getMilliseconds(), 3)}`;
  requestAnimationFrame(renderClock);
}

function renderDateTZ() {
  const now = new Date();
  $('date').textContent = `${DAYS[now.getDay()]} · ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}

function tick() {
  const now = new Date();
  const { currents, next } = computeSlots(now);
  renderNow(currents);
  renderCard('next', next, 'NO UPCOMING SESSION');
  renderDateTZ();
}

tick();
setInterval(tick, 500);
requestAnimationFrame(renderClock);
</script>
</body>
</html>
