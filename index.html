  { day:"2026-04-20", start:"08:00", end:"12:00", title:"SET DOWN", participants:"CREW / IT / LOGISTIC" },
  { day:"2026-04-20", start:"12:00", end:"13:00", title:"LUNCH BREAK", participants:"CREW / IT / LOGISTIC" },
  { day:"2026-04-20", start:"13:00", end:"13:00", title:"START FROM THE TRACK => RETURN TO SIGNES", participants:"CREW / IT / LOGISTIC" },
  { day:"2026-04-21", start:"07:00", end:"09:00", title:"BREAKFAST AT THE HOTEL", participants:"DEBAUD / FONTA / MOVICO TRUCKS DRIVERS" },
  { day:"2026-04-21", start:"08:00", end:"19:00", title:"SET DOWN / RETURN TO SIGNES", participants:"CREW / IT / LOGISTIC" },
];

const $ = (id) => document.getElementById(id);
const pad = (n, w=2) => String(n).padStart(w, '0');

function todayKey(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function parseItemDate(item, kind) {
  const [y,m,d] = item.day.split('-').map(Number);
  const [hh,mm] = item[kind].split(':').map(Number);
  return new Date(y, m-1, d, hh, mm, 0, 0);
}

function computeSlots(now) {
  const key = todayKey(now);
  const items = SCHEDULE.filter(i => i.day === key);

  let current = null, prev = null, next = null;

  for (const it of items) {
    const s = parseItemDate(it, 'start');
    const e = parseItemDate(it, 'end');
    if (s <= now && now < e) {
      if (!current || s > parseItemDate(current, 'start')) current = it;
    }
    if (e <= now) {
      if (!prev || e > parseItemDate(prev, 'end')) prev = it;
    }
    if (s > now) {
      if (!next || s < parseItemDate(next, 'start')) next = it;
    }
  }
  return { current, prev, next };
}

function renderCard(prefix, item, emptyText) {
  const titleEl = $(`${prefix}-title`);
  const timeEl = $(`${prefix}-time`);
  const partEl = $(`${prefix}-part`);
  if (!item) {
    titleEl.textContent = emptyText;
    timeEl.classList.add('hidden');
    partEl.classList.add('hidden');
    timeEl.textContent = '';
    partEl.textContent = '';
    return;
  }
  titleEl.textContent = item.title;
  timeEl.textContent = `${item.start} → ${item.end}`;
  partEl.textContent = item.participants;
  timeEl.classList.remove('hidden');
  partEl.classList.remove('hidden');
}

const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function renderClock() {
  const now = new Date();
  $('hm').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  $('sec').textContent = `:${pad(now.getSeconds())}`;
  $('ms').textContent = `.${pad(now.getMilliseconds(), 3)}`;
  requestAnimationFrame(renderClock);
}

function renderDateTZ() {
  const now = new Date();
  $('date').textContent = `${DAYS[now.getDay()]} · ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}

function tick() {
  const now = new Date();
  const { current, next } = computeSlots(now);
  renderCard('now', current, 'NO ACTIVE SESSION');
  renderCard('next', next, 'NO UPCOMING SESSION');
  renderDateTZ();
}

tick();
setInterval(tick, 500);
requestAnimationFrame(renderClock);
</script>
